# =============================================================================
# GWAS Pipeline v2 Configuration — YF-4363 / XI-4103 (snpseq01427)
# Pararge aegeria — NN (non-diapause) vs DD (diapause)
# =============================================================================

# Reference genome (edited headers: 1-27, W, Z, NW_*)
reference: "genome/GCF_905163445.1_ilParAegt1.1_genomic.edited.fna"

# Annotation
annotation: "genome/GCF_905163445.1_ilParAegt1.1_genomic.gff"

# Sample table (tab-separated: sample, user_id, group, r1, r2)
samples: "samples.tsv"

# Phenotype file (tab-separated: sample_id, phenotype)
# Phenotype should be coded as 1 (control) and 2 (case) for PLINK
phenotype_file: "data/phenotypes.txt"

# Variant QC thresholds
maf_threshold: 0.05
geno_threshold: 0.1
hwe_threshold: 1e-6

# Sample QC thresholds
mind_threshold: 0.1

# Resources (local Mac: 28 cores, ~90 GB RAM — using ~85%)
threads: 24
